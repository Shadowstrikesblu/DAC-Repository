# A generic, single database configuration.

[alembic]
script_location = migrations

prepend_sys_path = .

path_separator = os

# database URL.
sqlalchemy.url = ${DATABASE_URL}
#sqlalchemy.url = postgresql://admin:root%%26@localhost/devops_api_db

[post_write_hooks]
# (vide, tu n’as pas de hooks)

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
