services:
  - type: web
    name: devops-backend
    env: python
    plan: starter
    branch: v2-dev
    rootDir: devops_api
    buildCommand: |
      set -e
      pip install --upgrade pip
      pip install --no-cache-dir -r requirements.txt
      pip install --no-cache-dir ansible

      # Variables versions
      TF_VERSION=1.6.6
      K8S_VERSION=v1.29.6

      # Binaires locaux
      mkdir -p bin

      # Terraform
      curl -fsSL --retry 3 "https://releases.hashicorp.com/terraform/${TF_VERSION}/terraform_${TF_VERSION}_linux_amd64.zip" -o tf.zip
      unzip -o tf.zip -d bin && rm -f tf.zip
      chmod +x bin/terraform

      # kubectl
      curl -fsSL --retry 3 -o bin/kubectl "https://storage.googleapis.com/kubernetes-release/release/${K8S_VERSION}/bin/linux/amd64/kubectl"
      chmod +x bin/kubectl

      # Checks
      python --version
      ./bin/terraform -version
      ./bin/kubectl version --client=true

    startCommand: >
      bash -lc '
        set -e;
        export PYTHONUNBUFFERED=1;
        export PATH="/opt/render/project/src/devops_api/bin:$PATH";
        echo "[runtime PATH] $PATH";
        alembic upgrade head;
        terraform -version;
        uvicorn app.main:app --host 0.0.0.0 --port $PORT
      '

    disk:
      name: data
      mountPath: /data
      sizeGB: 10

    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: FERNET_KEY
        sync: false
      - key: FERNET_SECRET
        sync: false
      - key: BACKEND_BASE_URL
        sync: false
      - key: RUN_DB_SETUP
        value: "true"
      - key: GENERATED_ROOT
        value: /data/generated_files
      - key: FILE_RETENTION_DAYS
        value: "7"
      - key: MAX_DISK_USAGE_GB
        value: "8"
      - key: S3_ARCHIVE_BUCKET
        value: ""

  - type: web
    name: devops-frontend
    env: node
    plan: free
    branch: v2-dev
    rootDir: frontend
    buildCommand: |
      npm install
      npm run build
    startCommand: npx serve -s dist -l $PORT
    envVars:
      - key: VITE_API_URL
        value: https://devops-backend.onrender.com
