services:
  postgres:
    image: postgres:15-alpine
    container_name: dac-codecamp-postgres
    environment:
      POSTGRES_USER: dac
      POSTGRES_PASSWORD: dac
      POSTGRES_DB: devops_api_db
    ports:
      - "5432:5432"
    volumes:
      - dac_codecamp_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dac -d devops_api_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./devops_api
    container_name: dac-codecamp-backend
    environment:
      DAC_ENV: ${DAC_ENV:-development}
      DAC_SCHOOL_MODE: ${DAC_SCHOOL_MODE:-true}
      DAC_SCHOOL_MAX_INSTANCES: ${DAC_SCHOOL_MAX_INSTANCES:-1}
      DAC_LOG_LEVEL: ${DAC_LOG_LEVEL:-debug}
      DATABASE_URL: postgresql://dac:dac@postgres:5432/devops_api_db
      BACKEND_BASE_URL: ${BACKEND_BASE_URL:-http://backend:8000}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost:5173}
      SECRET_KEY: ${SECRET_KEY:-change-this-secret-key-for-local-dev}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      FERNET_KEY: ${FERNET_KEY:-2sxscx5ymkGlgp1LBXePogI3ybiEuoAr3m5DYzQfowE=}
      FERNET_SECRET: ${FERNET_SECRET:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DAC_AI_PROVIDER: ${DAC_AI_PROVIDER:-mock}
      DAC_AI_MODEL: ${DAC_AI_MODEL:-gpt-4o-mini}
    ports:
      - "8000:8000"
    volumes:
      - dac_generated_files:/app/generated_files
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8000
    container_name: dac-codecamp-frontend
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  dac_codecamp_pgdata:
  dac_generated_files:
